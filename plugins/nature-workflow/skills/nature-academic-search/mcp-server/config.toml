[pubmed]
email = ""  # Set your PubMed email here or via PUBMED_EMAIL env var
api_key = ""
cache_dir = "~/.cache/academic-search"
cache_ttl = 86400

[crossref]
mailto = ""
timeout = 15

[arxiv]
timeout = 30

[openalex]
mailto = ""  # optional; opts into OpenAlex's faster polite pool. OPENALEX_MAILTO env overrides.
timeout = 20

[unpaywall]
email = ""  # required for Unpaywall OA lookup. UNPAYWALL_EMAIL env overrides.
timeout = 20

[europepmc]
timeout = 20  # free, no key; life-science + biomedical preprints

[semanticscholar]
api_key = ""  # optional; lifts the ~1 req/s anon limit. SEMANTIC_SCHOLAR_API_KEY env overrides.
timeout = 20

[general]
default_rows = 5
max_rows = 50
